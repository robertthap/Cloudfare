# After you push this repo to GitHub, add secrets:
#   AZURE_WEBAPP_NAME       → your App Service name (e.g. namuna-foods-web)
#   AZURE_WEBAPP_PUBLISH_PROFILE → contents of Download publish profile from Azure Portal
#
# Azure Portal → Web App → Download publish profile → open XML → copy entire file → paste as secret value.

name: Deploy to Azure Web App

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: dotnet publish
        run: dotnet publish Gharkowebsite/Gharkowebsite/Gharkowebsite.csproj -c Release -o "${{ github.workspace }}/out"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "${{ github.workspace }}/out"
